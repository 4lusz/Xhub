# Copia de referencia do config real em producao
# (/etc/nginx/sites-available/xhub.conf na VPS) -- gerado manualmente e
# depois com o bloco HTTPS/redirect adicionado automaticamente pelo
# `certbot --nginx` (linhas marcadas "# managed by Certbot"). Nunca
# editar certificados/paths do Let's Encrypt na mao -- deixar o certbot
# gerenciar. Ver deploy/README.md para o resto da topologia de producao.
server {
    server_name xhub.app.br www.xhub.app.br;

    root /opt/xhub/frontend/dist;
    index index.html;

    # Headers de seguranca do frontend (a API ja tem os dela via
    # SecurityHeadersMiddleware -- ver docs/AUDITORIA_SEGURANCA.md).
    # Recomendado durante a auditoria da pagina de marketing: nao da
    # pra fazer isso via <meta> (nao cobre frame-ancestors, e arriscaria
    # quebrar o HMR do Vite em dev) -- aqui, no proxy reverso de
    # producao, e o lugar certo.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://xhub.app.br; frame-ancestors 'none';" always;

    # Video ate 512MB (ver docs/ROADMAP_MEDIA.md) + folga pro overhead do multipart.
    client_max_body_size 550m;
    client_body_timeout 300s;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/xhub.app.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/xhub.app.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.xhub.app.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = xhub.app.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name xhub.app.br www.xhub.app.br;
    return 404; # managed by Certbot




}