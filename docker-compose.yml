name: xhub

services:
  db:
    image: postgres:16-alpine
    container_name: xhub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xhub}
      POSTGRES_DB: ${POSTGRES_DB:-xhub}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - xhub_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xhub -d xhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xhub-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-xhub}:${POSTGRES_PASSWORD:-xhub}@db:5432/${POSTGRES_DB:-xhub}}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xhub-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev -- --host 0.0.0.0

volumes:
  xhub_pg_data:
