name: xhub

services:
  db:
    image: postgres:16-alpine
    container_name: xhub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xhub}
      POSTGRES_DB: ${POSTGRES_DB:-xhub}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - xhub_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xhub -d xhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xhub-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-xhub}:${POSTGRES_PASSWORD:-xhub}@db:5432/${POSTGRES_DB:-xhub}}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xhub-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - xhub_frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    # `npm install` roda a cada start (nao so na build da imagem) para
    # sincronizar node_modules com o package.json/package-lock.json
    # atuais do bind mount antes do Vite subir. Sem isso, o volume de
    # node_modules (necessario para isolar do host -- ver comentario no
    # `volumes:` acima) pode ficar dessincronizado do lockfile em algum
    # ponto do historico de rebuilds e nunca mais se autocorrigir, mesmo
    # com `--build`, causando "Failed to resolve import" para pacotes
    # que existem no package.json mas nao nesse volume especifico.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  xhub_pg_data:
  # Volume nomeado (nao anonimo) para node_modules do frontend: isola o
  # node_modules do bind mount `./frontend:/app` (evita binarios
  # compilados para o host vazando pro container Linux), mas com nome
  # estavel -- diferente de um volume anonimo (`- /app/node_modules`),
  # que gera um novo volume orfao a cada recriacao do container e nunca
  # e limpo por `docker compose down` sem `-v`. Para forcar uma
  # reinstalacao 100% do zero: `docker compose down -v`.
  xhub_frontend_node_modules:
